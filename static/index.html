<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Data Assistant</title>
<style>
  :root {
    --bg: #f6f7f9;
    --panel: #ffffff;
    --sidebar: #1c1f24;
    --sidebar-hover: #2a2e35;
    --border: #e3e6ea;
    --text: #1c1f24;
    --muted: #6b7280;
    --accent: #2f6f4f;
    --accent-light: #e8f3ec;
    --bubble-user: #2f6f4f;
    --bubble-bot: #f0f1f3;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
  }

  /* ---------- SIDEBAR ---------- */
  #sidebar {
    width: 260px;
    background: var(--sidebar);
    color: #e5e7eb;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  #sidebar .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid #33373f;
  }
  #newChatBtn {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
  }
  #sessionList {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .session-item {
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13.5px;
    color: #cbd2d9;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .session-item:hover {
    background: var(--sidebar-hover);
  }
  .session-item.active {
    background: var(--sidebar-hover);
    color: white;
  }

  /* ---------- MAIN CHAT AREA ---------- */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    padding: 18px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
  }
  header h1 { font-size: 17px; font-weight: 600; margin: 0; }
  header p { margin: 0; font-size: 13px; color: var(--muted); }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
  }
  .msg {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 14px;
    line-height: 1.5;
    font-size: 14.5px;
    white-space: pre-wrap;
  }
  .user {
    align-self: flex-end;
    background: var(--bubble-user);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .bot {
    align-self: flex-start;
    background: var(--bubble-bot);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .bot.loading { color: var(--muted); font-style: italic; }
  .empty { margin: auto; text-align: center; color: var(--muted); }
  .empty h2 { color: var(--text); font-size: 18px; margin-bottom: 6px; }

  form {
    border-top: 1px solid var(--border);
    background: var(--panel);
    padding: 16px 24px;
    display: flex;
    justify-content: center;
  }
  .input-row {
    width: 100%;
    max-width: 760px;
    display: flex;
    gap: 10px;
  }
  input[type="text"] {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 14.5px;
    outline: none;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14.5px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
</style>
</head>
<body>

<div id="sidebar">
  <div class="sidebar-header">
    <button id="newChatBtn">+ New Chat</button>
  </div>
  <div id="sessionList"></div>
</div>

<div id="main">
  <header>
    <div class="dot"></div>
    <div>
      <h1>School Data Assistant</h1>
      <p>Ask anything about student records, marks or attendance</p>
    </div>
  </header>

  <div id="chat">
    <div class="empty" id="emptyState">
      <h2>Start the conversation</h2>
      <p>e.g. "Who has the highest percentage in 10th std?"</p>
    </div>
  </div>

  <form id="chatForm">
    <div class="input-row">
      <input type="text" id="questionInput" placeholder="Type a question..." autocomplete="off" />
      <button type="submit" id="sendBtn">Send</button>
    </div>
  </form>
</div>

<script>
const chat = document.getElementById('chat');
const form = document.getElementById('chatForm');
const input = document.getElementById('questionInput');
const sendBtn = document.getElementById('sendBtn');
const sessionList = document.getElementById('sessionList');
const newChatBtn = document.getElementById('newChatBtn');

let currentSessionId = null;

function clearChat() {
  chat.innerHTML = '<div class="empty" id="emptyState"><h2>Start the conversation</h2><p>e.g. "Who has the highest percentage in 10th std?"</p></div>';
}

function addMessage(text, role) {
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function loadSessions() {
  const res = await fetch('/sessions');
  const data = await res.json();
  sessionList.innerHTML = '';
  data.sessions.forEach(s => {
    const div = document.createElement('div');
    div.className = 'session-item' + (s.session_id === currentSessionId ? ' active' : '');
    div.textContent = s.title;
    div.onclick = () => openSession(s.session_id);
    sessionList.appendChild(div);
  });
}

async function openSession(sessionId) {
  currentSessionId = sessionId;
  clearChat();
  const res = await fetch('/sessions/' + sessionId);
  const data = await res.json();
  if (data.messages.length === 0) return;
  document.getElementById('emptyState')?.remove();
  data.messages.forEach(m => addMessage(m.text, m.role));
  loadSessions();
}

async function startNewChat() {
  const res = await fetch('/sessions', { method: 'POST' });
  const data = await res.json();
  currentSessionId = data.session_id;
  clearChat();
  loadSessions();
  input.focus();
}

newChatBtn.addEventListener('click', startNewChat);

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const question = input.value.trim();
  if (!question) return;

  // First message-na, session illati pudhusa create pannunga
  if (!currentSessionId) {
    const res = await fetch('/sessions', { method: 'POST' });
    const data = await res.json();
    currentSessionId = data.session_id;
  }

  addMessage(question, 'user');
  input.value = '';
  sendBtn.disabled = true;

  const loadingDiv = addMessage('Checking student records...', 'bot loading');

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, session_id: currentSessionId })
    });
    const data = await res.json();
    loadingDiv.textContent = data.answer;
    loadingDiv.classList.remove('loading');
  } catch (err) {
    loadingDiv.textContent = 'Connection error. Server-a check pannunga.';
    loadingDiv.classList.remove('loading');
  } finally {
    sendBtn.disabled = false;
    input.focus();
    loadSessions();
  }
});

// Page load aagumbodhu, sidebar-la past chats list pannunga
loadSessions();
</script>

</body>
</html>
